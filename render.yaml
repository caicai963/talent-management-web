services:
  - type: web
    name: talent-management-web
    env: python
    region: oregon
    plan: free
    branch: main
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: "gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 2"
    healthCheckPath: /
    healthCheckInterval: 60
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FLASK_ENV
        value: production
      - key: PORT
        value: 10000
