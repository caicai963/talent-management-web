# Render Blueprint
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: talent-management
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app -b 0.0.0.0:$PORT
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.11