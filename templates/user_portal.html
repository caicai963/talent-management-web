<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>兼职报名系统</title>
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'PingFang SC','Microsoft YaHei',sans-serif; background:#f0f2f5; min-height:100vh; }
.header { background:#fff; box-shadow:0 2px 8px rgba(0,0,0,0.08); padding:0 24px; height:56px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
.header-title { font-size:16px; font-weight:600; color:#333; }
.header-right { display:flex; align-items:center; gap:12px; }
.username { font-size:13px; color:#666; }
.logout-btn { padding:6px 16px; background:#fff; border:1px solid #ddd; border-radius:6px; font-size:13px; cursor:pointer; color:#666; }
.logout-btn:hover { color:#1677ff; border-color:#1677ff; }
.main { max-width:900px; margin:24px auto; padding:0 16px; }
.card { background:#fff; border-radius:12px; padding:24px; margin-bottom:20px; box-shadow:0 2px 8px rgba(0,0,0,0.06); }
.card-title { font-size:16px; font-weight:600; color:#333; margin-bottom:20px; padding-bottom:12px; border-bottom:1px solid #f0f0f0; }
.form-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
.form-group { margin-bottom:14px; }
label { display:block; font-size:13px; color:#666; margin-bottom:6px; }
input, textarea, select { width:100%; padding:9px 12px; border:1px solid #ddd; border-radius:6px; font-size:14px; outline:none; transition:border 0.2s; font-family:inherit; }
input:focus, textarea:focus { border-color:#1677ff; }
textarea { resize:vertical; min-height:80px; }
.btn-row { display:flex; justify-content:flex-end; gap:12px; margin-top:16px; }
.btn-primary { padding:9px 24px; background:#1677ff; color:#fff; border:none; border-radius:6px; font-size:14px; cursor:pointer; }
.btn-primary:hover { background:#1668d9; }
.btn-secondary { padding:9px 24px; background:#fff; color:#666; border:1px solid #ddd; border-radius:6px; font-size:14px; cursor:pointer; }
.status-tag { display:inline-block; padding:2px 10px; border-radius:12px; font-size:12px; font-weight:500; }
.status-enrolled { background:#e6f4ff; color:#1677ff; }
.status-confirmed { background:#f6ffed; color:#52c41a; }
.status-rejected { background:#fff1f0; color:#cf1322; }
.enrollment-item { display:flex; justify-content:space-between; align-items:center; padding:16px 0; border-bottom:1px solid #f5f5f5; }
.enrollment-item:last-child { border-bottom:none; }
.enrollment-info { flex:1; }
.enrollment-title { font-size:14px; font-weight:500; color:#333; margin-bottom:4px; }
.enrollment-meta { font-size:12px; color:#999; }
.enrollment-status { text-align:right; }
.enrollment-date { font-size:12px; color:#999; margin-top:4px; }
.empty { text-align:center; padding:40px; color:#999; font-size:14px; }
.toast { position:fixed; bottom:32px; left:50%; transform:translateX(-50%); background:#333; color:#fff; padding:10px 24px; border-radius:8px; font-size:14px; z-index:9999; opacity:0.9; }
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-title">📋 兼职报名系统</div>
    <div class="header-right">
      <span class="username">{{ username }}</span>
      <a href="/user/logout"><button class="logout-btn">退出登录</button></a>
    </div>
  </div>

  <div class="main">
    <!-- 我的信息 -->
    <div class="card">
      <div class="card-title">👤 我的信息</div>
      <div class="form-grid">
        <div class="form-group">
          <label>姓名</label>
          <input v-model="profile.real_name" type="text" placeholder="请填写姓名" />
        </div>
        <div class="form-group">
          <label>手机号</label>
          <input v-model="profile.phone" type="tel" placeholder="请填写手机号" maxlength="11" />
        </div>
      </div>
      <div class="form-group">
        <label>空闲时间</label>
        <textarea v-model="profile.available_time" placeholder="请填写您的空闲时间，如：周一至周五 9:00-18:00，周末可全天"></textarea>
      </div>
      <div class="btn-row">
        <button class="btn-primary" @click="saveProfile">保存信息</button>
      </div>
    </div>

    <!-- 我的报名 -->
    <div class="card">
      <div class="card-title">📝 我的报名</div>
      <div v-if="loading" class="empty">加载中...</div>
      <div v-else-if="enrollments.length === 0" class="empty">暂无报名记录，收到招募通知后即可报名。</div>
      <div v-else>
        <div v-for="e in enrollments" :key="e.demand_id + '_' + e.talent_id" class="enrollment-item">
          <div class="enrollment-info">
            <div class="enrollment-title">{{ e.title }}</div>
            <div class="enrollment-meta">{{ e.business_type }}</div>
          </div>
          <div class="enrollment-status">
            <span :class="'status-tag status-' + e.enrollment_status">{{ statusText(e.enrollment_status) }}</span>
            <div class="enrollment-date">报名于 {{ formatDate(e.enrolled_at) }}</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div v-if="toast" class="toast">{{ toast }}</div>
</div>

<script>
const { createApp, ref, onMounted } = Vue;
createApp({
  setup() {
    const username = ref('');
    const profile = ref({ real_name: '', phone: '', available_time: '' });
    const enrollments = ref([]);
    const loading = ref(true);
    const toast = ref('');

    const showToast = (msg) => { toast.value = msg; setTimeout(() => toast.value = '', 2500); };
    const formatDate = (d) => d ? new Date(d).toLocaleString('zh-CN') : '-';
    const statusText = (s) => ({ enrolled:'已报名', confirmed:'已录取', rejected:'未录取' }[s] || s || '已报名');

    const loadData = async () => {
      try {
        const [statusRes, enrollRes] = await Promise.all([
          fetch('/api/auth/status'),
          fetch('/api/user/enrollments')
        ]);
        const status = await statusRes.json();
        if (!status.logged_in) { window.location.href = '/user'; return; }
        username.value = status.username;
        profile.value = { real_name: status.real_name || '', phone: status.phone || '', available_time: '' };

        const enrollData = await enrollRes.json();
        enrollments.value = Array.isArray(enrollData) ? enrollData : [];
      } catch(e) { showToast('加载失败'); }
      loading.value = false;
    };

    const saveProfile = async () => {
      try {
        const res = await fetch('/api/user/profile', {
          method:'PUT',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify(profile.value)
        });
        const r = await res.json();
        showToast(r.message || (res.ok ? '保存成功' : '保存失败'));
      } catch(e) { showToast('保存失败'); }
    };

    onMounted(loadData);
    return { username, profile, enrollments, loading, toast, saveProfile, formatDate, statusText };
  }
}).mount('#app');
</script>
</body>
</html>
