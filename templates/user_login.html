<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>兼职报名登录</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'PingFang SC','Microsoft YaHei',sans-serif; background:#f0f2f5; min-height:100vh; display:flex; align-items:center; justify-content:center; }
  .login-box { background:#fff; padding:40px; border-radius:12px; box-shadow:0 4px 24px rgba(0,0,0,0.1); width:380px; }
  h1 { font-size:22px; color:#333; margin-bottom:8px; text-align:center; }
  .subtitle { color:#888; font-size:14px; text-align:center; margin-bottom:28px; }
  .form-group { margin-bottom:16px; }
  label { display:block; font-size:13px; color:#666; margin-bottom:6px; }
  input { width:100%; padding:10px 12px; border:1px solid #ddd; border-radius:6px; font-size:14px; outline:none; transition:border 0.2s; }
  input:focus { border-color:#1677ff; }
  .btn { width:100%; padding:11px; background:#1677ff; color:#fff; border:none; border-radius:6px; font-size:15px; cursor:pointer; margin-top:8px; }
  .btn:hover { background:#1668d9; }
  .error { background:#fff1f0; border:1px solid #ffccc7; color:#cf1322; padding:10px 12px; border-radius:6px; margin-bottom:16px; font-size:13px; }
  .hint { margin-top:20px; padding-top:20px; border-top:1px solid #eee; font-size:12px; color:#999; text-align:center; line-height:1.8; }
  .hint strong { color:#666; }
</style>
</head>
<body>
<div class="login-box">
  <h1>👋 欢迎回来</h1>
  <p class="subtitle">请登录您的兼职账号</p>

  % if defined('error'):
  <div class="error">{{ error }}</div>
  % end

  <form method="POST" action="/user/login">
    <div class="form-group">
      <label>用户名</label>
      <input name="username" type="text" placeholder="输入用户名" required autofocus />
    </div>
    <div class="form-group">
      <label>密码</label>
      <input name="password" type="password" placeholder="输入密码" required />
    </div>
    <button type="submit" class="btn">登录</button>
  </form>

  <div class="hint">
    <strong>提示：</strong>账号由管理员开通后生效<br/>
    用户名：姓名全拼（小写）<br/>
    密码：手机号码
  </div>
</div>
</body>
</html>
